<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>뽀모도로</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
            background: #F5EFE0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 300px;
        }

        .tabs {
            display: flex;
            background: #E8DDC8;
            border-radius: 16px;
            padding: 4px;
            width: 100%;
        }

        .tab {
            flex: 1;
            padding: 9px 0;
            text-align: center;
            font-size: 11px;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #9C8560;
            border-radius: 13px;
            cursor: pointer;
            transition: all 0.22s;
            user-select: none;
        }

        .tab.active {
            background: #3D2B1A;
            color: #F5EFE0;
        }

        #ring-wrap {
            position: relative;
            width: 210px;
            height: 210px;
            cursor: grab;
            user-select: none;
        }

        #ring-wrap:active {
            cursor: grabbing;
        }

        #time-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }

        #time-text {
            font-size: 46px;
            font-weight: 200;
            color: #3D2B1A;
            line-height: 1;
            white-space: nowrap;
            letter-spacing: -1px;
            pointer-events: all;
            cursor: pointer;
        }

        #time-inp {
            font-size: 46px;
            font-weight: 200;
            color: #3D2B1A;
            background: transparent;
            border: none;
            outline: none;
            border-bottom: 1.5px solid #B09060;
            width: 140px;
            text-align: center;
            display: none;
            font-family: inherit;
            letter-spacing: -1px;
            line-height: 1;
        }

        #mode-lbl {
            font-size: 10px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #B09060;
            pointer-events: none;
        }

        #drag-h {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #3D2B1A;
            border: 3px solid #F5EFE0;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            transition: background 0.35s, width 0.15s, height 0.15s, box-shadow 0.15s;
        }

        #drag-h.dragging {
            width: 20px;
            height: 20px;
            box-shadow: 0 0 0 6px rgba(61, 43, 26, 0.12);
        }

        #controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        #reset-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1.5px solid #C8B898;
            background: #EDE3D0;
            color: #6A5438;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }

        #reset-btn:hover {
            background: #E0D4BC;
            border-color: #A8906A;
        }

        #reset-btn svg {
            width: 18px;
            height: 18px;
        }

        #play-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #3D2B1A;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 6px 22px rgba(61, 43, 26, 0.38), 0 2px 6px rgba(61, 43, 26, 0.22);
        }

        #play-btn:hover {
            background: #2A1A0A;
        }

        #play-btn:active {
            transform: scale(0.93);
        }

        #play-btn svg {
            width: 26px;
            height: 26px;
            fill: #F5EFE0;
            flex-shrink: 0;
        }

        .dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #D4C4A4;
            transition: background 0.3s;
        }

        .dot.done {
            background: #7A5830;
        }

        #banner {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #3D2B1A;
            color: #F5EFE0;
            font-size: 13px;
            letter-spacing: 0.06em;
            padding: 12px 26px;
            border-radius: 28px;
            white-space: nowrap;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #banner.show {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div id="card">
        <div class="tabs">
            <div class="tab active" id="tab-f">집중</div>
            <div class="tab" id="tab-b">휴식</div>
        </div>

        <div id="ring-wrap">
            <div id="drag-h"></div>
            <svg width="210" height="210" viewBox="0 0 210 210" style="display:block;overflow:visible">
                <circle cx="105" cy="105" r="90" fill="none" stroke="#3D2B1A" stroke-width="1" opacity="0.12" />
                <circle id="drag-preview" cx="105" cy="105" r="90" fill="none" stroke="#3D2B1A" stroke-width="1.5"
                    stroke-linecap="round" stroke-dasharray="4 6" transform="rotate(-90 105 105)" opacity="0"
                    style="transition: opacity 0.15s;" />
                <circle id="drag-fill" cx="105" cy="105" r="90" fill="none" stroke="#3D2B1A" stroke-width="2"
                    stroke-linecap="round" stroke-dasharray="565.49" stroke-dashoffset="565.49"
                    transform="rotate(-90 105 105)" opacity="0" />
                <circle id="prog" cx="105" cy="105" r="90" fill="none" stroke="#B83020" stroke-width="2"
                    stroke-linecap="round" stroke-dasharray="565.49" stroke-dashoffset="565.49"
                    transform="rotate(-90 105 105)" opacity="0" />
            </svg>
            <div id="time-center">
                <div id="time-text">50:00</div>
                <input id="time-inp" type="text" maxlength="5" placeholder="MM:SS" />
                <div id="mode-lbl">집중</div>
            </div>
        </div>

        <div id="controls">
            <button id="reset-btn" title="초기화">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
            </button>
            <button id="play-btn">
                <svg id="play-icon" viewBox="0 0 24 24" fill="#F5EFE0">
                    <path d="M6 3.5l13 8.5-13 8.5V3.5z" />
                </svg>
            </button>
        </div>

        <div class="dots">
            <div class="dot" id="d0"></div>
            <div class="dot" id="d1"></div>
            <div class="dot" id="d2"></div>
            <div class="dot" id="d3"></div>
        </div>
    </div>

    <div id="banner"></div>

    <script>
        const FOCUS_DEF = 50 * 60;
        const BREAK_DEF = 10 * 60;
        const MAX_F = 60 * 60;
        const MAX_B = 15 * 60;
        const R = 90;
        const CIRC = 2 * Math.PI * R;
        const CF = '#B83020';
        const CB = '#2E7D52';
        const CI = '#3D2B1A';

        let mode = 'focus', fSec = FOCUS_DEF, bSec = BREAK_DEF;
        let total = FOCUS_DEF, remain = FOCUS_DEF;
        let running = false, started = false, session = 0, ticker = null;

        const prog = document.getElementById('prog');
        const dragFill = document.getElementById('drag-fill');
        const dragPrev = document.getElementById('drag-preview');
        const timeTxt = document.getElementById('time-text');
        const timeInp = document.getElementById('time-inp');
        const modeLbl = document.getElementById('mode-lbl');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const resetBtn = document.getElementById('reset-btn');
        const tabF = document.getElementById('tab-f');
        const tabB = document.getElementById('tab-b');
        const ringWrap = document.getElementById('ring-wrap');
        const dragH = document.getElementById('drag-h');
        const banner = document.getElementById('banner');

        function fmt(s) {
            return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
        }

        function draw() {
            const pct = total > 0 ? remain / total : 0;
            const deg = 360 * pct - 90;
            const rad = deg * Math.PI / 180;
            dragH.style.left = (105 + R * Math.cos(rad)) + 'px';
            dragH.style.top = (105 + R * Math.sin(rad)) + 'px';

            if (started) {
                prog.setAttribute('opacity', '1');
                prog.setAttribute('stroke', mode === 'focus' ? CF : CB);
                prog.setAttribute('stroke-dashoffset', (CIRC * (1 - pct)).toFixed(2));
                dragH.style.background = mode === 'focus' ? CF : CB;
            } else {
                prog.setAttribute('opacity', '0');
                dragH.style.background = CI;
            }

            timeTxt.textContent = fmt(remain);
            document.title = fmt(remain) + (mode === 'focus' ? ' · 집중' : ' · 휴식');
        }

        function setIcon(playing) {
            playIcon.innerHTML = playing
                ? '<rect x="5" y="4" width="4.5" height="16" rx="1.5"/><rect x="14.5" y="4" width="4.5" height="16" rx="1.5"/>'
                : '<path d="M6 3.5l13 8.5-13 8.5V3.5z"/>';
        }

        function updateDots() {
            for (let i = 0; i < 4; i++) {
                document.getElementById('d' + i).className = 'dot' + (i < session ? ' done' : '');
            }
        }

        function applyMode(m) {
            mode = m;
            total = m === 'focus' ? fSec : bSec;
            remain = total;
            tabF.className = 'tab' + (m === 'focus' ? ' active' : '');
            tabB.className = 'tab' + (m === 'break' ? ' active' : '');
            modeLbl.textContent = m === 'focus' ? '집중' : '휴식';
        }

        function tick() {
            if (remain <= 0) {
                clearInterval(ticker);
                running = false;
                chime();
                if (mode === 'focus') {
                    session = Math.min(session + 1, 4);
                    updateDots();
                    started = true;
                    applyMode('break');
                    draw();
                    ticker = setInterval(tick, 1000);
                    running = true;
                    setIcon(true);
                    showBanner('집중 완료! 휴식을 시작합니다');
                } else {
                    started = false;
                    applyMode('focus');
                    draw();
                    setIcon(false);
                    showBanner('휴식 종료 — 새 뽀모도로를 시작하세요');
                }
                return;
            }
            remain--;
            draw();
        }

        function start() {
            if (running || remain <= 0) return;
            started = true;
            running = true;
            ticker = setInterval(tick, 1000);
            draw();
            setIcon(true);
        }

        function pause() {
            clearInterval(ticker);
            running = false;
            setIcon(false);
        }

        function reset() {
            pause();
            started = false;
            applyMode(mode);
            draw();
            setIcon(false);
        }

        let bannerTimer = null;
        function showBanner(msg) {
            banner.textContent = msg;
            banner.classList.add('show');
            clearTimeout(bannerTimer);
            bannerTimer = setTimeout(() => banner.classList.remove('show'), 3000);
        }

        function chime() {
            try {
                const ctx = new AudioContext();
                [[523, 0], [659, 0.2], [784, 0.4]].forEach(([f, t]) => {
                    const o = ctx.createOscillator(), g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.frequency.value = f;
                    g.gain.setValueAtTime(0.15, ctx.currentTime + t);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.7);
                    o.start(ctx.currentTime + t);
                    o.stop(ctx.currentTime + t + 0.8);
                });
            } catch (e) { }
        }

        playBtn.addEventListener('click', () => { if (running) pause(); else start(); });
        resetBtn.addEventListener('click', reset);

        tabF.addEventListener('click', () => {
            if (running && !confirm('타이머 실행 중입니다. 중단할까요?')) return;
            pause(); started = false; applyMode('focus'); draw(); setIcon(false);
        });
        tabB.addEventListener('click', () => {
            if (running && !confirm('타이머 실행 중입니다. 중단할까요?')) return;
            pause(); started = false; applyMode('break'); draw(); setIcon(false);
        });

        timeTxt.addEventListener('dblclick', () => {
            if (running) return;
            timeTxt.style.display = 'none';
            timeInp.style.display = 'block';
            timeInp.value = fmt(remain);
            timeInp.focus();
            timeInp.select();
        });

        function commitInp() {
            const val = timeInp.value.trim();
            let s = 0;
            if (val.includes(':')) {
                const [m, sc] = val.split(':').map(Number);
                s = (m || 0) * 60 + (sc || 0);
            } else {
                s = (parseInt(val) || 0) * 60;
            }
            const mx = mode === 'focus' ? MAX_F : MAX_B;
            s = Math.max(60, Math.min(mx, s));
            if (mode === 'focus') fSec = s; else bSec = s;
            total = s; remain = s; started = false;
            timeInp.style.display = 'none';
            timeTxt.style.display = '';
            draw();
        }
        timeInp.addEventListener('blur', commitInp);
        timeInp.addEventListener('keydown', e => { if (e.key === 'Enter') commitInp(); });

        /* ── 드래그 ── */
        let dragging = false;

        function secFrom(cx, cy) {
            const rect = ringWrap.getBoundingClientRect();
            let deg = Math.atan2(cy - (rect.top + 105), cx - (rect.left + 105)) * 180 / Math.PI + 90;
            if (deg < 0) deg += 360;
            const mx = mode === 'focus' ? MAX_F : MAX_B;
            return Math.max(60, Math.min(mx, Math.round((deg / 360) * mx)));
        }

        function startDrag() {
            if (running) return;
            dragging = true;
            dragH.classList.add('dragging');
            dragPrev.setAttribute('opacity', '0.18');
        }

        function doDrag(cx, cy) {
            if (!dragging) return;
            const s = secFrom(cx, cy);
            if (mode === 'focus') fSec = s; else bSec = s;
            total = s; remain = s; started = false;

            const pct = s / (mode === 'focus' ? MAX_F : MAX_B);
            dragFill.setAttribute('opacity', '0.55');
            dragFill.setAttribute('stroke-dashoffset', (CIRC * (1 - pct)).toFixed(2));

            draw();
        }

        function endDrag() {
            if (!dragging) return;
            dragging = false;
            dragH.classList.remove('dragging');
            dragPrev.setAttribute('opacity', '0');
            dragFill.setAttribute('opacity', '0');
        }

        ringWrap.addEventListener('mousedown', e => { if (e.detail === 2) return; startDrag(); e.preventDefault(); });
        document.addEventListener('mousemove', e => { if (dragging) doDrag(e.clientX, e.clientY); });
        document.addEventListener('mouseup', endDrag);
        ringWrap.addEventListener('touchstart', () => { startDrag(); }, { passive: true });
        document.addEventListener('touchmove', e => { if (dragging) doDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
        document.addEventListener('touchend', endDrag);

        draw();
        updateDots();
    </script>
</body>

</html>
